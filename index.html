<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#07080f;--bg2:#0d0f1a;--bg3:#121520;--bg4:#181c2c;
  --border:#1a1e30;--border2:#252a42;--text:#eceef8;
  --muted:#3d4460;--muted2:#6872a0;--accent:#5865f2;--accent2:#4050d8;
  --gold:#f0a500;--silver:#9aa0c0;--bronze:#c07840;
  --red:#ff4757;--green:#2ed573;--orange:#ff8c00;
  --card-radius:10px;
}
html,body{height:100%;background:var(--bg);}
body{font-family:'Barlow',sans-serif;color:var(--text);font-size:14px;overflow:hidden;}

.layout{display:flex;flex-direction:column;height:100vh;}
.main-area{display:flex;flex:1;overflow:hidden;}
.content{flex:1;overflow-y:auto;background:var(--bg);position:relative;}
.content::-webkit-scrollbar{width:3px;}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* HEADER */
.top-header{background:rgba(13,15,26,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:14px;height:52px;flex-shrink:0;position:relative;z-index:20;}
.logo-mark{display:flex;align-items:center;gap:0;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}
.logo-alpha{color:var(--text);}
.logo-max{color:#fff;background:var(--accent);padding:2px 9px;margin-left:6px;border-radius:5px;font-size:17px;letter-spacing:4px;position:relative;overflow:hidden;}
.logo-max::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);transform:translateX(-100%);animation:logoSheen 4s ease-in-out infinite;}
@keyframes logoSheen{0%,65%{transform:translateX(-100%);}100%{transform:translateX(200%);}}
.logo-divider{width:1px;height:22px;background:var(--border2);margin:0 4px;}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:600;}
.header-spacer{flex:1;}
.sync-pill{display:flex;align-items:center;gap:6px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;color:var(--muted);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(46,213,115,.7);}
.sync-dot.offline{background:var(--red);box-shadow:0 0 8px rgba(255,71,87,.6);}
.sync-dot.syncing{background:var(--gold);box-shadow:0 0 8px rgba(240,165,0,.7);animation:sdPulse .6s ease-in-out infinite;}
@keyframes sdPulse{0%,100%{opacity:1;}50%{opacity:.2;}}
.user-btn{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:5px 12px 5px 7px;cursor:pointer;transition:all .18s;color:var(--muted2);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;}
.user-btn:hover{border-color:var(--accent);color:var(--text);}
.user-av{width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden;}
.user-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.request-btn{display:flex;align-items:center;gap:7px;background:linear-gradient(135deg,#ff4757,#b02030);color:#fff;border:none;padding:7px 16px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:opacity .15s,transform .15s;white-space:nowrap;}
.request-btn:hover{opacity:.85;transform:translateY(-1px);}

/* TABS */
.tabs-bar{background:rgba(13,15,26,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;flex-shrink:0;position:relative;z-index:19;}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 18px 8px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;min-width:76px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;transition:color .2s,border-color .2s;user-select:none;position:relative;}
.tab:hover{color:var(--muted2);}
.tab.active{color:var(--text);border-bottom-color:var(--accent);}
.tab-icon{font-size:15px;line-height:1;}
.tab-badge{position:absolute;top:7px;right:10px;min-width:16px;height:16px;background:var(--red);border-radius:8px;font-size:9px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;padding:0 4px;font-family:'Barlow Condensed',sans-serif;}

/* SIDEBAR */
.sidebar{width:56px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:18px 0;gap:8px;flex-shrink:0;}
.sb-logo{font-size:9px;font-weight:900;letter-spacing:3px;color:var(--accent);writing-mode:vertical-rl;transform:rotate(180deg);margin-bottom:12px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;}
.sb-logo em{color:var(--muted2);font-style:normal;}
.sb-btn{width:36px;height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;font-size:16px;transition:background .15s,color .15s;}
.sb-btn:hover{background:var(--bg4);color:var(--text);}
.sb-btn.active{background:var(--accent);color:#fff;}

/* NEWS */
.news-page{max-width:800px;margin:0 auto;padding:24px 20px;}
.news-page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.news-broadcast-title{display:flex;align-items:center;gap:12px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:32px;letter-spacing:2px;text-transform:uppercase;}
.live-badge{display:flex;align-items:center;gap:5px;background:var(--red);border-radius:4px;padding:3px 9px;font-size:10px;font-weight:800;letter-spacing:2px;color:#fff;font-family:'Barlow Condensed',sans-serif;animation:livePulse 2s ease-in-out infinite;}
@keyframes livePulse{0%,100%{opacity:1;}50%{opacity:.6;}}
.live-dot{width:6px;height:6px;border-radius:50%;background:#fff;}
.news-page-count{font-size:11px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;}
.news-ticker{background:var(--red);color:#fff;height:30px;overflow:hidden;display:flex;align-items:center;margin-bottom:20px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;}
.ticker-label{background:rgba(0,0,0,.3);padding:0 12px;height:100%;display:flex;align-items:center;white-space:nowrap;letter-spacing:2px;font-size:11px;flex-shrink:0;}
.ticker-track{overflow:hidden;flex:1;}
.ticker-inner{display:flex;animation:tickerScroll 30s linear infinite;}
.ticker-inner span{white-space:nowrap;padding:0 40px;}
@keyframes tickerScroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.news-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-radius);margin-bottom:14px;overflow:hidden;transition:border-color .2s,transform .2s,box-shadow .2s;animation:fadeUp .4s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.news-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4);}
.news-card.alert-card{border-left:4px solid var(--red);}
.news-card.manual-card{border-left:4px solid var(--accent);}
.news-card-hero{position:relative;width:100%;height:200px;overflow:hidden;background:var(--bg3);}
.news-card-hero img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease;}
.news-card:hover .news-card-hero img{transform:scale(1.03);}
.news-card-hero-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(135deg,var(--bg3),var(--bg4));color:var(--muted);}
.news-card-category{position:absolute;top:10px;left:10px;padding:3px 10px;border-radius:4px;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;backdrop-filter:blur(6px);}
.cat-alert{background:rgba(255,71,87,.85);color:#fff;}
.cat-manual{background:rgba(88,101,242,.85);color:#fff;}
.news-card-inner{padding:16px 18px;}
.news-card-headline{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:19px;letter-spacing:.3px;line-height:1.3;margin-bottom:6px;color:var(--text);}
.news-card-summary{font-size:13px;color:var(--muted2);line-height:1.6;margin-bottom:10px;}
.news-card-meta{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;}
.news-card-players{display:flex;gap:6px;padding:0 18px 16px;flex-wrap:wrap;}
.nc-player-chip{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 5px;cursor:pointer;transition:all .15s;text-decoration:none;}
.nc-player-chip:hover{border-color:var(--accent);background:rgba(88,101,242,.1);}
.nc-chip-av{width:22px;height:22px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff;flex-shrink:0;}
.nc-chip-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.nc-chip-name{font-size:11px;font-weight:700;color:var(--text);font-family:'Barlow Condensed',sans-serif;}
.news-empty-state{text-align:center;padding:80px 24px;color:var(--muted);}
.news-empty-state .big{font-size:56px;margin-bottom:14px;animation:bounce 2s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.news-empty-state p{font-size:14px;line-height:1.9;}

/* RANKINGS */
.list-header{display:grid;grid-template-columns:126px 1fr 170px;padding:9px 20px;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;border-bottom:1px solid var(--border);background:rgba(13,15,26,.98);position:sticky;top:0;z-index:10;font-family:'Barlow Condensed',sans-serif;}
.rrow{display:grid;grid-template-columns:126px 1fr 170px;border-bottom:1px solid var(--border);cursor:pointer;min-height:78px;align-items:stretch;position:relative;animation:rowIn .38s ease both;transition:background .15s;}
@keyframes rowIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
.rrow:nth-child(2){animation-delay:.03s;}.rrow:nth-child(3){animation-delay:.06s;}.rrow:nth-child(4){animation-delay:.09s;}.rrow:nth-child(5){animation-delay:.12s;}.rrow:nth-child(n+6){animation-delay:.15s;}
.rrow:hover{background:rgba(255,255,255,.022);}
.rrow:last-child{border-bottom:none;}
.rcard{display:flex;align-items:stretch;height:100%;}
.rcard-medal{position:relative;}
.rcard-medal::before{content:'';position:absolute;inset:4px;border-radius:5px;pointer-events:none;z-index:3;}
.medal-gold  .rcard-medal::before{box-shadow:0 0 0 2px var(--gold),0 0 16px rgba(240,165,0,.45);}
.medal-silver.rcard-medal::before{box-shadow:0 0 0 2px var(--silver),0 0 12px rgba(154,160,192,.3);}
.medal-bronze.rcard-medal::before{box-shadow:0 0 0 2px var(--bronze),0 0 12px rgba(192,120,64,.3);}
.rnum{width:54px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;font-family:'Barlow Condensed',sans-serif;}
.rav{flex:1;overflow:hidden;display:flex;}
.av-fill{width:100%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;overflow:hidden;font-family:'Barlow Condensed',sans-serif;}
.av-fill img{width:100%;height:100%;object-fit:cover;display:block;}
@keyframes goldPulse  {0%,100%{box-shadow:inset 0 0 0 0 rgba(240,165,0,0);}   50%{box-shadow:inset 0 0 60px rgba(240,165,0,.08);}}
@keyframes silverPulse{0%,100%{box-shadow:inset 0 0 0 0 rgba(154,160,184,0);} 50%{box-shadow:inset 0 0 50px rgba(154,160,184,.06);}}
@keyframes bronzePulse{0%,100%{box-shadow:inset 0 0 0 0 rgba(192,120,64,0);}  50%{box-shadow:inset 0 0 46px rgba(192,120,64,.06);}}
@keyframes crownBob   {0%,100%{transform:translateX(-50%) rotate(-5deg);}50%{transform:translateX(-50%) translateY(-3px) rotate(5deg);}}
@keyframes conicSpin  {to{transform:rotate(360deg);}}
.rrow-1{background:linear-gradient(90deg,rgba(240,165,0,.13),rgba(240,165,0,.04) 55%,transparent)!important;border-bottom:1px solid rgba(240,165,0,.3)!important;animation:rowIn .38s ease both,goldPulse 3.5s .5s ease-in-out infinite;}
.rrow-1 .rnum{background:linear-gradient(160deg,#2c2000,#181200)!important;color:var(--gold)!important;text-shadow:0 0 20px rgba(240,165,0,.9);flex-direction:column;padding-top:18px;align-items:flex-end;padding-bottom:6px;position:relative;}
.rrow-1 .rnum::before{content:'👑';font-size:13px;text-shadow:none;position:absolute;top:5px;left:50%;transform:translateX(-50%);animation:crownBob 2.8s ease-in-out infinite;}
.rrow-1 .rav{background:linear-gradient(140deg,#3a2800,#1e1400)!important;border-right:2px solid rgba(240,165,0,.4);position:relative;overflow:hidden;}
.rrow-1 .rav::after{content:'';position:absolute;inset:0;background:conic-gradient(transparent 20%,rgba(240,165,0,.05) 50%,transparent 80%);animation:conicSpin 12s linear infinite;pointer-events:none;}
.rrow-1 .pname{font-size:18px!important;color:#ffe082!important;}
.rrow-1 .sval{text-shadow:0 0 16px rgba(240,165,0,.65);}
.rrow-1:hover{background:linear-gradient(90deg,rgba(240,165,0,.19),rgba(240,165,0,.08) 55%,transparent)!important;}
.rrow-2{background:linear-gradient(90deg,rgba(180,186,215,.09),rgba(180,186,215,.03) 55%,transparent)!important;border-bottom:1px solid rgba(154,160,192,.22)!important;animation:rowIn .38s .04s ease both,silverPulse 4s .55s ease-in-out infinite;}
.rrow-2 .rnum{background:linear-gradient(160deg,#1a1e32,#0e1020)!important;color:#cdd1e8!important;text-shadow:0 0 12px rgba(195,200,230,.5);}
.rrow-2 .rav{background:linear-gradient(140deg,#20264a,#111420)!important;border-right:2px solid rgba(154,160,192,.26);}
.rrow-2 .pname{color:#dde0f8!important;}
.rrow-3{background:linear-gradient(90deg,rgba(192,120,64,.09),rgba(192,120,64,.03) 55%,transparent)!important;border-bottom:1px solid rgba(192,120,64,.22)!important;animation:rowIn .38s .08s ease both,bronzePulse 4.5s .6s ease-in-out infinite;}
.rrow-3 .rnum{background:linear-gradient(160deg,#201800,#120e00)!important;color:#d4945a!important;text-shadow:0 0 12px rgba(192,120,64,.5);}
.rrow-3 .rav{background:linear-gradient(140deg,#281800,#160e00)!important;border-right:2px solid rgba(192,120,64,.26);}
.rrow-3 .pname{color:#e0aa80!important;}
.rrow-n .rnum{background:var(--bg3);color:var(--muted2);}
.rrow-n .rav{background:var(--bg3);}
.pcell{padding:0 14px;display:flex;flex-direction:column;justify-content:center;gap:5px;}
.pname{font-size:16px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;}
.psub{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted2);flex-wrap:wrap;}
.scell{padding:0 18px 0 0;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:5px;}
.sval{font-size:22px;font-weight:900;font-family:'Barlow Condensed',sans-serif;}
.sbar-wrap{width:80px;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;}
.sbar{height:100%;border-radius:2px;transition:width .5s ease;}
.tbadge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;}
.tpip{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.override-badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--muted2);}
.rank-move{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:800;font-family:'Barlow Condensed',sans-serif;padding:2px 6px;border-radius:4px;}
.rank-move.up{background:rgba(46,213,115,.12);color:var(--green);border:1px solid rgba(46,213,115,.25);}
.rank-move.down{background:rgba(255,71,87,.12);color:var(--red);border:1px solid rgba(255,71,87,.25);}
.rank-move.new{background:rgba(88,101,242,.12);color:#818cf8;border:1px solid rgba(88,101,242,.25);}

/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
.mov.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:580px;position:relative;margin:auto;animation:modalIn .28s cubic-bezier(.34,1.36,.64,1) both;}
@keyframes modalIn{from{opacity:0;transform:translateY(22px) scale(.96);}to{opacity:1;transform:none;}}
.modal-hero{position:relative;height:160px;overflow:hidden;border-radius:14px 14px 0 0;}
.modal-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(10px) brightness(.38);transform:scale(1.12);}
.modal-hero-av{position:absolute;left:22px;bottom:-32px;width:82px;height:82px;border-radius:10px;overflow:hidden;border:3px solid var(--bg2);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#fff;font-family:'Barlow Condensed',sans-serif;box-shadow:0 6px 28px rgba(0,0,0,.8);}
.modal-hero-av img{width:100%;height:100%;object-fit:cover;}
.modal-hero-rank{position:absolute;right:18px;bottom:14px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:1px;text-transform:uppercase;}
.mclose{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.15);color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .15s;z-index:2;}
.mclose:hover{background:rgba(255,71,87,.7);}
.modal-nameblock{padding:42px 22px 14px;border-bottom:1px solid var(--border);}
.mn{font-size:27px;font-weight:900;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;line-height:1;}
.mn-nick{font-size:13px;color:var(--muted2);margin-top:3px;}
.mn-tier{margin-top:9px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.mbody{padding:16px 22px 6px;}
.mstats-big{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.ms{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 8px;text-align:center;transition:border-color .2s,transform .2s;}
.ms:hover{border-color:var(--border2);transform:translateY(-2px);}
.msl{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;font-family:'Barlow Condensed',sans-serif;font-weight:700;}
.msv{font-size:26px;font-weight:900;font-family:'Barlow Condensed',sans-serif;}
.mbio{font-size:13px;color:var(--muted2);line-height:1.8;border-left:2px solid var(--accent);padding-left:12px;margin-bottom:16px;font-style:italic;}
.mtraits{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px;}
.mtrait{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 9px;border-radius:3px;background:rgba(88,101,242,.12);border:1px solid rgba(88,101,242,.25);color:#818cf8;font-family:'Barlow Condensed',sans-serif;}
.mbar-section{margin-bottom:16px;}
.mbar-title{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;font-family:'Barlow Condensed',sans-serif;}
.mbar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.mbar-label{font-size:11px;font-weight:700;color:var(--muted2);letter-spacing:.5px;text-transform:uppercase;width:46px;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;}
.mbar-wrap{flex:1;height:7px;background:var(--border2);border-radius:4px;overflow:hidden;}
.mbar-fill{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.22,1,.36,1);}
.mbar-val{font-size:13px;font-weight:700;color:var(--text);width:28px;text-align:right;font-family:'Barlow Condensed',sans-serif;}
.rankup-section{margin:0 22px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.rankup-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none;transition:background .15s;}
.rankup-header:hover{background:var(--bg4);}
.rankup-header-left{display:flex;align-items:center;gap:8px;}
.rankup-header-icon{font-size:16px;}
.rankup-header-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;color:var(--muted2);}
.rankup-chevron{font-size:10px;color:var(--muted);transition:transform .2s;}
.rankup-chevron.open{transform:rotate(180deg);}
.rankup-body{display:none;padding:0 14px 14px;}
.rankup-body.open{display:block;}
.rankup-cats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.rankup-cat{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px;cursor:pointer;transition:all .15s;}
.rankup-cat:hover,.rankup-cat.active{border-color:var(--accent);background:rgba(88,101,242,.08);}
.rankup-cat-icon{font-size:18px;margin-bottom:4px;}
.rankup-cat-name{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;color:var(--muted2);}
.rankup-cat-score{font-size:16px;font-weight:900;font-family:'Barlow Condensed',sans-serif;margin-top:2px;}
.rankup-tips{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px;}
.rankup-tip-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;color:var(--accent);margin-bottom:8px;}
.rankup-tip-list{list-style:none;}
.rankup-tip-list li{font-size:12.5px;color:var(--muted2);line-height:1.6;padding:4px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:7px;}
.rankup-tip-list li:last-child{border-bottom:none;}
.rankup-tip-list li::before{content:'→';color:var(--accent);font-weight:700;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;font-size:13px;}
.vote-section{padding:14px 22px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.vote-label{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;flex-shrink:0;}
.vote-btns{display:flex;gap:8px;flex:1;}
.vote-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:9px 12px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.5px;text-transform:uppercase;transition:all .18s;color:var(--muted2);user-select:none;}
.vote-btn:hover{background:var(--bg4);transform:translateY(-1px);}
.vote-btn.voted-over{background:rgba(255,71,87,.12);border-color:var(--red);color:var(--red);}
.vote-btn.voted-under{background:rgba(46,213,115,.12);border-color:var(--green);color:var(--green);}
.vote-btn .vicon{font-size:16px;}
.vote-count{font-size:16px;font-weight:900;font-family:'Barlow Condensed',sans-serif;}
.vote-tally{font-size:11px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;margin-left:auto;text-align:right;line-height:1.6;}
.modal-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 22px;}
.modal-tab{padding:10px 4px;margin-right:18px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
.modal-tab.active{color:var(--text);border-bottom-color:var(--accent);}
.modal-tab-panel{display:none;padding:14px 22px 18px;}
.modal-tab-panel.active{display:block;animation:fadeIn .2s ease both;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal-news-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.modal-news-item:last-child{border-bottom:none;}
.modal-news-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.modal-news-text{flex:1;font-size:13px;font-family:'Barlow Condensed',sans-serif;font-weight:600;line-height:1.4;}
.modal-news-time{font-size:10px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;flex-shrink:0;white-space:nowrap;}
.modal-news-empty{font-size:12px;color:var(--muted);font-style:italic;padding:8px 0;}
.comments-list{margin-bottom:14px;}
.comment-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);animation:fadeIn .2s ease both;}
.comment-item:last-child{border-bottom:none;}
.comment-av{width:32px;height:32px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--muted2);flex-shrink:0;font-family:'Barlow Condensed',sans-serif;}
.comment-body{flex:1;min-width:0;}
.comment-name{font-size:12px;font-weight:700;font-family:'Barlow Condensed',sans-serif;color:var(--text);}
.comment-text{font-size:13px;color:var(--muted2);line-height:1.5;margin-top:2px;word-break:break-word;}
.comment-meta{display:flex;align-items:center;gap:8px;margin-top:4px;}
.comment-time{font-size:10px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;}
.comment-del{font-size:10px;color:var(--muted);cursor:pointer;font-family:'Barlow Condensed',sans-serif;background:none;border:none;padding:0;display:none;transition:color .15s;}
.comment-del:hover{color:var(--red);}
.admin-active .comment-del{display:inline;}
.comment-form{display:flex;flex-direction:column;gap:8px;}
.comment-input-row{display:flex;gap:8px;}
.comment-name-input,.comment-text-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:5px;font-size:13px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .15s;}
.comment-name-input:focus,.comment-text-input:focus{border-color:var(--accent);}
.comment-name-input{flex:0 0 130px;font-size:12px;}
.comment-text-input{flex:1;resize:none;min-height:60px;}
.comment-submit{align-self:flex-end;background:var(--accent);color:#fff;border:none;padding:7px 18px;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:opacity .15s,transform .15s;}
.comment-submit:hover{opacity:.85;transform:translateY(-1px);}
.comments-empty{font-size:12px;color:var(--muted);font-style:italic;padding:8px 0;}

/* AUTH MODAL */
.auth-mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:400;align-items:center;justify-content:center;padding:16px;}
.auth-mov.open{display:flex;}
.auth-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:420px;padding:32px;position:relative;animation:modalIn .28s cubic-bezier(.34,1.36,.64,1) both;}
.auth-logo{display:flex;align-items:center;gap:8px;margin-bottom:24px;justify-content:center;}
.auth-logo-icon{width:44px;height:44px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;color:#fff;letter-spacing:1px;}
.auth-logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:2px;text-transform:uppercase;}
.auth-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;text-align:center;margin-bottom:6px;letter-spacing:1px;}
.auth-sub{font-size:13px;color:var(--muted2);text-align:center;margin-bottom:24px;line-height:1.6;}
.auth-form{display:flex;flex-direction:column;gap:12px;}
.auth-input-group label{display:block;font-size:9px;color:var(--muted);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;font-family:'Barlow Condensed',sans-serif;}
.auth-input-group input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:10px 14px;border-radius:7px;font-size:14px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .15s;}
.auth-input-group input:focus{border-color:var(--accent);}
.auth-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:12px;border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .15s,transform .15s;margin-top:4px;}
.auth-btn:hover{opacity:.88;transform:translateY(-1px);}
.auth-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--muted2);}
.auth-switch a{color:var(--accent);cursor:pointer;font-weight:600;text-decoration:none;}
.auth-switch a:hover{text-decoration:underline;}
.auth-error{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.25);color:var(--red);padding:8px 12px;border-radius:5px;font-size:12px;display:none;}
.auth-error.show{display:block;animation:fadeIn .2s ease both;}
.auth-close{position:absolute;top:14px;right:14px;background:var(--bg3);border:1px solid var(--border);color:var(--muted2);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.auth-close:hover{color:var(--red);border-color:var(--red);}

/* JOIN REQUEST */
.req-page{max-width:540px;margin:0 auto;padding:40px 20px;}
.req-header{text-align:center;margin-bottom:32px;}
.req-header-icon{font-size:52px;display:block;margin-bottom:12px;animation:bounce 2s ease-in-out infinite;}
.req-title{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.req-sub{font-size:14px;color:var(--muted2);line-height:1.7;}
.req-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-radius);padding:24px;}
.req-form{display:flex;flex-direction:column;gap:14px;}
.req-fg label{display:block;font-size:9px;color:var(--muted);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;font-family:'Barlow Condensed',sans-serif;}
.req-fg input,.req-fg textarea,.req-fg select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:6px;font-size:13px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .15s;}
.req-fg input:focus,.req-fg textarea:focus,.req-fg select:focus{border-color:var(--accent);}
.req-fg textarea{resize:vertical;min-height:80px;}
.req-photo-preview{width:80px;height:80px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:24px;margin-bottom:8px;}
.req-photo-preview img{width:100%;height:100%;object-fit:cover;}
.req-submit-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:12px 24px;border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .18s;width:100%;}
.req-submit-btn:hover{opacity:.88;transform:translateY(-1px);}
.req-submit-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.req-already{text-align:center;padding:32px 20px;}
.req-login-prompt{text-align:center;padding:40px 20px;}
.req-login-prompt-icon{font-size:40px;margin-bottom:14px;display:block;}

/* ADMIN REQUESTS */
.req-list-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;transition:border-color .15s;animation:fadeUp .3s ease both;}
.req-list-item:hover{border-color:var(--border2);}
.req-list-photo{width:56px;height:56px;border-radius:8px;flex-shrink:0;overflow:hidden;background:var(--bg4);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:20px;}
.req-list-photo img{width:100%;height:100%;object-fit:cover;}
.req-list-info{flex:1;min-width:0;}
.req-list-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:var(--text);margin-bottom:2px;}
.req-list-bio{font-size:12px;color:var(--muted2);line-height:1.5;margin-bottom:6px;}
.req-list-meta{font-size:10px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;}
.req-list-actions{display:flex;gap:6px;flex-shrink:0;}
.req-approve-btn{background:rgba(46,213,115,.15);border:1px solid rgba(46,213,115,.3);color:var(--green);padding:6px 12px;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.req-approve-btn:hover{background:rgba(46,213,115,.25);}
.req-reject-btn{background:rgba(255,71,87,.12);border:1px solid rgba(255,71,87,.25);color:var(--red);padding:6px 12px;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.req-reject-btn:hover{background:rgba(255,71,87,.22);}
.req-empty{color:var(--muted);font-size:13px;text-align:center;padding:20px 0;font-style:italic;}

/* EMPTY / LOADING */
.empty{text-align:center;padding:70px 24px;color:var(--muted);font-size:14px;line-height:2.2;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--muted);}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:lspin .7s linear infinite;}
@keyframes lspin{to{transform:rotate(360deg);}}
.tier-wrap{padding:16px 18px;}

/* ADMIN */
.dev-wrap{padding:22px;max-width:980px;margin:0 auto;}
.dev-top{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.dev-badge{background:var(--red);color:#fff;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;}
.dev-title{font-size:20px;font-weight:900;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:700px){.dgrid{grid-template-columns:1fr;}}
.dcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-radius);padding:16px;}
.dcard-t{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);font-family:'Barlow Condensed',sans-serif;}
.fg{margin-bottom:9px;}
.fg label{display:block;font-size:9px;color:var(--muted);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;font-family:'Barlow Condensed',sans-serif;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:5px;font-size:13px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .15s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);}
.fg select option{background:var(--bg3);}
.fg textarea{resize:vertical;min-height:60px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.auto-score-note{font-size:10px;color:var(--muted);margin-top:4px;font-style:italic;}
.btn{background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:5px;font-weight:700;font-size:12px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;transition:opacity .15s,transform .15s;}
.btn:hover{opacity:.85;transform:translateY(-1px);}
.btn-sm{padding:5px 11px;font-size:11px;}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--muted2);}
.btn-g:hover{color:var(--text);}
.btn-r{background:var(--red);}
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.swatches{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px;}
.sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;}
.sw:hover{transform:scale(1.2);}
.sw.sel{border-color:#fff;transform:scale(1.2);}
.tbox{display:flex;flex-wrap:wrap;gap:4px;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:6px;min-height:36px;cursor:text;}
.tpill{display:flex;align-items:center;gap:4px;background:rgba(88,101,242,.15);border:1px solid rgba(88,101,242,.3);color:#818cf8;font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;}
.tx{cursor:pointer;color:var(--muted);font-size:12px;}
.tx:hover{color:var(--red);}
.dli{display:flex;align-items:center;gap:10px;padding:9px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;margin-bottom:6px;transition:border-color .15s;}
.dli:hover{border-color:var(--border2);}
.dli-av{width:34px;height:34px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden;font-family:'Barlow Condensed',sans-serif;}
.dli-av img{width:100%;height:100%;object-fit:cover;border-radius:5px;}
.dli-info{flex:1;min-width:0;}
.dli-name{font-size:13px;font-weight:700;font-family:'Barlow Condensed',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dli-meta{font-size:10px;color:var(--muted);margin-top:1px;font-family:'Barlow Condensed',sans-serif;}
.dli-btns{display:flex;gap:5px;flex-shrink:0;}
.alert-msg{padding:8px 12px;border-radius:5px;font-size:12px;margin-bottom:10px;display:none;}
.alert-msg.show{display:block;animation:fadeIn .2s ease both;}
.al-ok{background:rgba(46,213,115,.1);border:1px solid rgba(46,213,115,.25);color:var(--green);}
.al-err{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.25);color:var(--red);}
.photo-area{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.photo-prev{width:46px;height:46px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px;}
.photo-prev img{width:100%;height:100%;object-fit:cover;}
.photo-opts{flex:1;display:flex;flex-direction:column;gap:5px;}
.photo-or{font-size:9px;color:var(--muted);text-align:center;text-transform:uppercase;letter-spacing:1px;font-family:'Barlow Condensed',sans-serif;}
.nli{display:flex;align-items:flex-start;gap:10px;padding:9px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;margin-bottom:6px;}
.nli-info{flex:1;min-width:0;}
.nli-headline{font-size:13px;font-weight:700;font-family:'Barlow Condensed',sans-serif;line-height:1.3;}
.nli-meta{font-size:10px;color:var(--muted);margin-top:2px;font-family:'Barlow Condensed',sans-serif;}
.nli-btns{display:flex;gap:5px;flex-shrink:0;}
.tier-btn-group{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;}
.tier-btn{padding:6px 11px;border-radius:4px;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;cursor:pointer;border:1px solid transparent;opacity:.4;transition:opacity .15s,transform .12s;background:var(--bg3);}
.tier-btn:hover{opacity:.7;}
.tier-btn.sel{opacity:1;border-color:currentColor;transform:scale(1.06);}
.tier-btn[data-tier="auto"]  {color:var(--muted2);}
.tier-btn[data-tier="Alpha+"]{color:#ff4757;}
.tier-btn[data-tier="Alpha"] {color:#ff8c00;}
.tier-btn[data-tier="Solid"] {color:#ffd32a;}

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot,
         setDoc, deleteDoc, addDoc, query, orderBy,
         writeBatch, updateDoc, getDoc }
  from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword,
         signInWithEmailAndPassword, signOut, onAuthStateChanged,
         updateProfile }
  from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

const cfg = window.FIREBASE_CONFIG;
const app  = initializeApp(cfg);
const db   = getFirestore(app);
const auth = getAuth(app);

const COLORS=['#e74c3c','#e67e22','#f39c12','#27ae60','#16a085','#2980b9','#8e44ad','#e91e63','#00bcd4','#607d8b'];
const TIERS=['auto','Alpha+','Alpha','Solid','Mid','Low','NPC'];
const TIER_COLORS={'Alpha+':'#ff4757','Alpha':'#ff8c00','Solid':'#ffd32a','Mid':'#2ed573','Low':'#1e90ff','NPC':'#a29bfe'};
const TIER_RANGES=[{label:'Alpha+',min:90},{label:'Alpha',min:75},{label:'Solid',min:60},{label:'Mid',min:45},{label:'Low',min:30},{label:'NPC',min:0}];
const CK='alphamax_code4';
const RMK='alphamax_rank_prev';
const RANKUP_TIPS={
  alpha:{icon:'⚡',label:'Alpha Score',tips:['Take charge in group settings — be the one who makes the call.','Stand firm on your opinions; don\'t flip when challenged.','Make bold moves others are afraid to take.','Speak first in the room. Silence signals uncertainty.','Own every outcome — your successes AND your L\'s.','Dress intentionally. Presentation signals status.']},
  clout:{icon:'👑',label:'Clout',tips:['Build your network — who you know matters as much as what you do.','Be seen at the right events and in the right circles.','Post wins publicly. Clout is a public sport.','Get people talking about you when you\'re not in the room.','Align yourself with people who are already rated highly.','Achieve something others genuinely can\'t ignore.']},
  rizz:{icon:'🔥',label:'Rizz Factor',tips:['Rizz someone up — sustained charm earns serious points.','Eye contact, timing, and confidence are the holy trinity.','Make people feel like the most interesting person in the room.','Have stories. Boring people don\'t have rizz.','Learn the art of the callback — remember details about people.','Never try too hard. The best rizz looks effortless.']}
};

let people=[], newsItems=[], comments={}, joinRequests=[], claimRequests=[];
let prizes={
  slot1:{icon:'🏆',name:'',desc:'',condition:''},
  slot2:{icon:'💵',name:'$1 Cash Prize',desc:'Winner takes all — one crisp dollar, straight to your pocket.',condition:'#1 on the overall tier list when April ends'},
  slot3:{icon:'🥉',name:'',desc:'',condition:''}
};
let currentUser=null, isAdmin=false;
let tab='news', traits=[], selColor=COLORS[0], selTierOverride='auto';
let buf='', btimer=null;
let currentModalId=null, currentModalTab='news';
let prevRanks={}, rankMovements={}, currentRankupCat='rizz';
let pendingAIChanges=null;
let countdownTimer=null;

const getCode     = ()  => localStorage.getItem(CK)||'me123';
const setCode     = c   => localStorage.setItem(CK,c);
const getVotes    = ()  => { try{return JSON.parse(localStorage.getItem('am_votes'))||{};}catch{return{};} };
const setVotes    = v   => localStorage.setItem('am_votes',JSON.stringify(v));
const getPrevRanks= ()  => { try{return JSON.parse(localStorage.getItem(RMK))||{};}catch{return{};} };
const setPrevRanks= r   => localStorage.setItem(RMK,JSON.stringify(r));
const clamp  = v  => Math.min(100,Math.max(0,isNaN(Number(v))?50:Number(v)));
const cs     = (a,c,r) => Math.round((clamp(a)+clamp(c)+clamp(r))/3);
const esc    = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const g      = id => document.getElementById(id);
const sorted = ()  => [...people].sort((a,b)=>(b.score||0)-(a.score||0));
const sortedBy=k   => [...people].sort((a,b)=>(b[k]||0)-(a[k]||0));

function setSyncStatus(s){
  const dot=g('sync-dot'),lbl=g('sync-label');if(!dot)return;
  dot.className='sync-dot'+(s==='live'?'':s==='syncing'?' syncing':' offline');
  lbl.textContent=s==='live'?'Live':s==='syncing'?'Syncing…':'Offline';
}
function tierInfo(score,override){
  if(override&&override!=='auto')return{label:override,color:TIER_COLORS[override]};
  for(const t of TIER_RANGES)if(score>=t.min)return{label:t.label,color:TIER_COLORS[t.label]};
  return{label:'NPC',color:TIER_COLORS['NPC']};
}
function timeAgo(ts){
  const m=Math.floor((Date.now()-ts)/60000);
  if(m<1)return'just now';if(m<60)return m+'m ago';
  const h=Math.floor(m/60);if(h<24)return h+'h ago';
  return Math.floor(h/24)+'d ago';
}
function computeMovements(){
  const pr=getPrevRanks();rankMovements={};
  sorted().forEach((p,i)=>{
    const newR=i+1,oldR=pr[p.id];
    if(!oldR)rankMovements[p.id]={type:'new',delta:0};
    else if(oldR>newR)rankMovements[p.id]={type:'up',delta:oldR-newR};
    else if(oldR<newR)rankMovements[p.id]={type:'down',delta:newR-oldR};
    else rankMovements[p.id]={type:'same',delta:0};
  });
}
function updatePrevRanks(){const cur={};sorted().forEach((p,i)=>cur[p.id]=i+1);setPrevRanks(cur);}
function moveBadgeHTML(id){
  const m=rankMovements[id];if(!m||m.type==='same')return'';
  if(m.type==='new')return`<span class="rank-move new">NEW</span>`;
  if(m.type==='up') return`<span class="rank-move up">▲ ${m.delta}</span>`;
  if(m.type==='down')return`<span class="rank-move down">▼ ${m.delta}</span>`;
  return'';
}
function avSmall(p,sz,r){
  const init=p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const bg=p.color||COLORS[0];
  const st=`background:${bg};width:${sz}px;height:${sz}px;border-radius:${r}px;font-size:${Math.round(sz*.3)}px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Barlow Condensed',sans-serif;flex-shrink:0;`;
  if(p.photo)return`<div style="${st}"><img src="${p.photo}" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:cover;border-radius:${r}px;"></div>`;
  return`<div style="${st}">${init}</div>`;
}
function avFill(p){
  const init=p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const bg=p.color||COLORS[0];
  const st=`background:${bg};width:100%;height:100%;font-size:18px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Barlow Condensed',sans-serif;`;
  if(p.photo)return`<div class="av-fill" style="${st}"><img src="${p.photo}" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:cover;display:block;"></div>`;
  return`<div class="av-fill" style="${st}">${init}</div>`;
}

const TAKEOVER=[
  '{w} just ate {l}\'s lunch. And his dinner. And his entire fridge.',
  '{w} said "hold my protein shake" and vaulted clean over {l}.',
  '{l} got absolutely cooked. Chef {w} is in the building.',
  'BREAKING: {l} spotted looking for excuses. {w} spotted looking for more victims.',
  '{w} climbed over {l} like he wasn\'t even there. Embarrassing scenes.',
  'Prayers up for {l}. {w} just rearranged the whole leaderboard.',
  '{l} has been dethroned. Long live {w}.',
  '{w} woke up and chose violence. {l} is the casualty.',
  'The gap between {w} and {l} is now larger than {l}\'s ego.',
];
const makeAlert=(w,l)=>TAKEOVER[Math.floor(Math.random()*TAKEOVER.length)].replace(/\{w\}/g,w).replace(/\{l\}/g,l);
async function checkRankChanges(before){
  const after={};sorted().forEach((p,i)=>after[p.id]=i+1);
  if(Object.keys(before).length>0){
    sorted().forEach((p,i)=>{
      const newR=i+1,oldR=before[p.id];
      if(oldR&&oldR>newR){
        sorted().forEach((other,j)=>{
          if(other.id===p.id)return;
          const oOld=before[other.id],oNew=j+1;
          if(oOld&&oOld<oldR&&oNew>newR)addDoc(collection(db,'news'),{headline:makeAlert(p.name,other.name),type:'alert',ts:Date.now(),mentionedIds:[p.id,other.id],image:''});
        });
      }
    });
  }
}

function render(){
  if(tab==='dev'){renderDev();return;}
  if(tab==='tier'){renderTierList();return;}
  if(tab==='news'){renderNewsPage();return;}
  if(tab==='joinreq'){renderJoinRequest();return;}
  if(tab==='prizes'){renderPrizePage();return;}
  renderRankings();
}

/* ══ PRIZE PAGE ══ */
function renderPrizePage(){
  if(countdownTimer)clearInterval(countdownTimer);
  // April 30 deadline
  const deadline=new Date('2025-05-01T00:00:00');
  const leader=sorted()[0];
  const leaderAv=leader?avSmall(leader,50,25):'';

  function buildCountdown(){
    const now=new Date();const diff=deadline-now;
    if(diff<=0)return`<div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--red);">⏰ APRIL HAS ENDED — WINNER BEING DETERMINED</div>`;
    const d=Math.floor(diff/86400000);const h=Math.floor((diff%86400000)/3600000);const m=Math.floor((diff%3600000)/60000);const s=Math.floor((diff%60000)/1000);
    return`<div class="prize-countdown-digits">
      <div class="countdown-unit"><div class="countdown-num" id="cd-d">${d}</div><div class="countdown-unit-label">Days</div></div>
      <div class="countdown-sep">:</div>
      <div class="countdown-unit"><div class="countdown-num" id="cd-h">${String(h).padStart(2,'0')}</div><div class="countdown-unit-label">Hours</div></div>
      <div class="countdown-sep">:</div>
      <div class="countdown-unit"><div class="countdown-num" id="cd-m">${String(m).padStart(2,'0')}</div><div class="countdown-unit-label">Mins</div></div>
      <div class="countdown-sep">:</div>
      <div class="countdown-unit"><div class="countdown-num" id="cd-s">${String(s).padStart(2,'0')}</div><div class="countdown-unit-label">Secs</div></div>
    </div>`;
  }

  function slotHTML(key,pos,posLabel,posIcon){
    const sl=prizes[key];
    const isEmpty=!sl.name&&!sl.desc;
    return`<div class="prize-slot ${key}">
      <span class="prize-slot-pos">${posIcon}</span>
      <div class="prize-slot-label">${posLabel}</div>
      ${isEmpty
        ?`<div class="prize-slot-empty">TBA</div>`
        :`<span class="prize-slot-icon">${sl.icon||'🎁'}</span>
          <div class="prize-slot-name">${esc(sl.name)}</div>
          <div class="prize-slot-desc">${esc(sl.desc)}</div>`
      }
      ${sl.condition?`<div class="prize-slot-condition">🎯 <strong>How to win:</strong> ${esc(sl.condition)}</div>`:''}
    </div>`;
  }

  g('content').innerHTML=`<div class="prize-page">
    <div class="prize-header">
      <div class="prize-header-title">🏅 Prizes</div>
      <p class="prize-header-sub">Stay ranked. Win real rewards. The clock is ticking.</p>
    </div>

    <div class="prize-countdown">
      <div class="prize-countdown-label">⏳ Time Remaining in April</div>
      <div id="prize-countdown-inner">${buildCountdown()}</div>
    </div>

    ${leader?`<div class="prize-leader-section" style="margin-bottom:24px;">
      ${leaderAv}
      <div>
        <div class="prize-leader-label">👑 Current Leader</div>
        <div class="prize-leader-name">${esc(leader.name)}</div>
        <div class="prize-leader-score">${leader.score||0} pts — #1 Overall</div>
      </div>
    </div>`:''}

    <div class="prize-podium">
      ${slotHTML('slot1','1','1st Place','🥇')}
      ${slotHTML('slot2','2','Grand Prize','💰')}
      ${slotHTML('slot3','3','3rd Place','🥉')}
    </div>
  </div>`;

  // live countdown tick
  countdownTimer=setInterval(()=>{
    const el=g('prize-countdown-inner');if(!el)return clearInterval(countdownTimer);
    const now=new Date();const diff=deadline-now;
    if(diff<=0){el.innerHTML=`<div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--red);">⏰ APRIL HAS ENDED</div>`;clearInterval(countdownTimer);return;}
    const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
    const dEl=g('cd-d'),hEl=g('cd-h'),mEl=g('cd-m'),sEl=g('cd-s');
    if(dEl)dEl.textContent=d;if(hEl)hEl.textContent=String(h).padStart(2,'0');if(mEl)mEl.textContent=String(m).padStart(2,'0');if(sEl)sEl.textContent=String(s).padStart(2,'0');
  },1000);
}

window.castVote=function(pid,type){
  const votes=getVotes();const pv=votes[pid]||{over:0,under:0,myVote:null};
  if(pv.myVote===type){pv[type]=Math.max(0,(pv[type]||0)-1);pv.myVote=null;}
  else{if(pv.myVote){pv[pv.myVote]=Math.max(0,(pv[pv.myVote]||0)-1);}pv[type]=(pv[type]||0)+1;pv.myVote=type;}
  votes[pid]=pv;setVotes(votes);
  const total=(pv.over||0)+(pv.under||0);const op=total?Math.round((pv.over||0)/total*100):0;
  const oc=g('vc-over'),uc=g('vc-under'),tl=g('vtally'),bo=g('vbtn-over'),bu=g('vbtn-under');
  if(oc)oc.textContent=pv.over||0;if(uc)uc.textContent=pv.under||0;
  if(bo)bo.className='vote-btn'+(pv.myVote==='over'?' voted-over':'');if(bu)bu.className='vote-btn'+(pv.myVote==='under'?' voted-under':'');
  if(tl)tl.innerHTML=total>0?`🔥 ${op}% · 💎 ${100-op}%<br><span style="font-size:9px;">${total} vote${total!==1?'s':''}</span>`:'<span style="font-size:10px;">No votes yet</span>';
};

window.submitAuth=async function(mode){
  const btn=g('auth-submit-btn');const errEl=g('auth-error');
  if(btn)btn.disabled=true;if(errEl)errEl.classList.remove('show');
  const email=(g('auth-email')||{value:''}).value.trim();
  const pass=(g('auth-pass')||{value:''}).value;
  const name=(g('auth-name')||{value:''}).value.trim();
  try{
    if(mode==='signup'){
      const cred=await createUserWithEmailAndPassword(auth,email,pass);
      if(name)await updateProfile(cred.user,{displayName:name});
    }else{
      await signInWithEmailAndPassword(auth,email,pass);
    }
    window.closeAuthModal();
  }catch(err){
    if(errEl){
      // Give user-friendly messages instead of Firebase's raw errors
      let msg=err.message;
      if(err.code==='auth/email-already-in-use')msg='An account with this email already exists.';
      else if(err.code==='auth/invalid-email')msg='Please enter a valid email address.';
      else if(err.code==='auth/weak-password')msg='Password must be at least 6 characters.';
      else if(err.code==='auth/user-not-found'||err.code==='auth/wrong-password'||err.code==='auth/invalid-credential')msg='Incorrect email or password.';
      else if(err.code==='auth/too-many-requests')msg='Too many attempts. Please try again later.';
      errEl.textContent=msg;errEl.classList.add('show');
    }
    if(btn)btn.disabled=false;
  }
};

  const srt=[...joinRequests].sort((a,b)=>{const o={pending:0,approved:1,rejected:2};return(o[a.status]||0)-(o[b.status]||0);});
  return srt.map(r=>{
    const statusColor=r.status==='pending'?'var(--gold)':r.status==='approved'?'var(--green)':'var(--red)';
    const statusLabel=r.status==='pending'?'⏳ Pending':r.status==='approved'?'✅ Approved':'❌ Rejected';
    const photoHTML=r.photo?`<img src="${r.photo}" alt="" onerror="this.parentElement.innerHTML='👤'">`:`👤`;
    return`<div class="req-list-item">
      <div class="req-list-photo">${photoHTML}</div>
      <div class="req-list-info">
        <div class="req-list-name">${esc(r.name)}${r.nickname?` <span style="color:var(--muted2);font-weight:600;font-size:13px;">"${esc(r.nickname)}"</span>`:''}</div>
        ${r.bio?`<div class="req-list-bio">${esc(r.bio)}</div>`:''}
        <div class="req-list-meta">${esc(r.email||'')} · ${timeAgo(r.ts)} · <span style="color:${statusColor};font-weight:700;">${statusLabel}</span></div>
      </div>
      <div class="req-list-actions">
        ${r.status==='pending'?`<button class="req-approve-btn" onclick="approveRequest('${r.id}')">✓ Approve</button><button class="req-reject-btn" onclick="rejectRequest('${r.id}')">✕ Reject</button>`:''}
        <button class="btn btn-sm btn-r" onclick="deleteRequest('${r.id}')">Del</button>
      </div>
    </div>`;
  }).join('');
}

window.approveRequest=async function(reqId){
  const r=joinRequests.find(x=>x.id===reqId);if(!r)return;
  setSyncStatus('syncing');
  const id='p'+Date.now();
  await setDoc(doc(db,'people',id),{id,name:r.name,nickname:r.nickname||'',bio:r.bio||'',photo:r.photo||'',color:r.color||COLORS[0],alpha:50,clout:50,rizz:50,score:50,traits:[],tierOverride:'auto'});
  await updateDoc(doc(db,'joinRequests',reqId),{status:'approved'});
  await addDoc(collection(db,'news'),{headline:`${r.name} just joined the Alpha Max tier list! 🔥`,type:'manual',ts:Date.now(),mentionedIds:[id],image:r.photo||''});
  setSyncStatus('live');showAlert('ok',`${r.name} approved & added!`);
};
window.rejectRequest=async function(reqId){if(!confirm('Reject this request?'))return;await updateDoc(doc(db,'joinRequests',reqId),{status:'rejected'});showAlert('ok','Request rejected.');};
window.deleteRequest=async function(reqId){if(!confirm('Delete this request permanently?'))return;await deleteDoc(doc(db,'joinRequests',reqId));showAlert('ok','Request deleted.');};

/* AI */
window.runAI=async function(){
  const prompt=(g('ai-prompt')||{value:''}).value.trim();
  if(!prompt){showAlert('err','Enter a description first.');return;}
  if(!people.length){showAlert('err','No profiles to update.');return;}
  if(!window.OPENAI_KEY||window.OPENAI_KEY.includes('PASTE')){showAlert('err','Add your OpenAI key.');return;}
  const btn=g('ai-run-btn');const status=g('ai-status');const result=g('ai-result');
  btn.disabled=true;status.textContent='Analyzing…';result.classList.remove('show');pendingAIChanges=null;
  const playerList=people.map(p=>`- ${p.name} (id:${p.id}, alpha:${p.alpha||0}, clout:${p.clout||0}, rizz:${p.rizz||0})`).join('\n');
  const systemMsg=`You are the scoring engine for ALPHA MAX. Given a natural language description of events, identify affected players, decide score adjustments (±1–20) for alpha/clout/rizz, and write a catchy headline (max 12 words). Return ONLY valid JSON: {"headline":"...","changes":[{"id":"...","name":"...","alphadelta":0,"cloutdelta":0,"rizzdelta":0}]}. Only include meaningfully affected players. No markdown.`;
  try{
    const resp=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${window.OPENAI_KEY}`},body:JSON.stringify({model:'gpt-4o-mini',messages:[{role:'system',content:systemMsg},{role:'user',content:`Players:\n${playerList}\n\nEvent:\n${prompt}`}],temperature:0.7,max_tokens:600})});
    if(!resp.ok)throw new Error(await resp.text());
    const data=await resp.json();
    const parsed=JSON.parse(data.choices[0].message.content.trim().replace(/```json|```/g,'').trim());
    pendingAIChanges=parsed;
    const{headline,changes}=parsed;
    const pills=changes.filter(c=>c.alphadelta||c.cloutdelta||c.rizzdelta).map(c=>{
      const parts=[];if(c.alphadelta)parts.push(`Alpha ${c.alphadelta>0?'+':''}${c.alphadelta}`);if(c.cloutdelta)parts.push(`Clout ${c.cloutdelta>0?'+':''}${c.cloutdelta}`);if(c.rizzdelta)parts.push(`Rizz ${c.rizzdelta>0?'+':''}${c.rizzdelta}`);
      const p=people.find(x=>x.id===c.id)||{color:'#607d8b'};
      return`<div class="ai-change-pill"><span style="width:5px;height:5px;border-radius:50%;background:${p.color||'#607d8b'};display:inline-block;"></span><b style="color:var(--text)">${esc(c.name)}</b><span style="color:var(--muted2)">${parts.join(', ')}</span></div>`;
    }).join('');
    result.innerHTML=`<div style="font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;margin-bottom:6px;font-weight:700;">Generated Headline</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:var(--text);margin-bottom:12px;">"${esc(headline)}"</div>
      <div class="ai-changes-preview"><div class="ai-changes-title">Score Changes</div><div style="display:flex;flex-wrap:wrap;gap:6px;">${pills||'<span style="color:var(--muted);font-size:12px;">No changes detected.</span>'}</div></div>
      <div class="ai-result-actions"><button class="btn" onclick="applyAIChanges()">✓ Apply &amp; Post</button><button class="btn btn-g" onclick="discardAI()">✕ Discard</button></div>`;
    result.classList.add('show');status.textContent='Review below';
  }catch(err){
    status.textContent='Error — check console';
    result.innerHTML=`<span style="color:var(--red);font-size:12px;">AI error: ${esc(String(err))}</span>`;
    result.classList.add('show');console.error('AI error:',err);
  }
  btn.disabled=false;
};
window.applyAIChanges=async function(){
  if(!pendingAIChanges)return;const{headline,changes}=pendingAIChanges;
  setSyncStatus('syncing');const before={};sorted().forEach((p,i)=>before[p.id]=i+1);const mentionedIds=[];
  for(const ch of changes){const p=people.find(x=>x.id===ch.id);if(!p)continue;mentionedIds.push(p.id);const na=clamp((p.alpha||0)+(ch.alphadelta||0)),nc2=clamp((p.clout||0)+(ch.cloutdelta||0)),nr=clamp((p.rizz||0)+(ch.rizzdelta||0));await setDoc(doc(db,'people',p.id),{...p,alpha:na,clout:nc2,rizz:nr,score:cs(na,nc2,nr)});}
  if(headline)await addDoc(collection(db,'news'),{headline,type:'manual',ts:Date.now(),mentionedIds,image:''});
  await checkRankChanges(before);setSyncStatus('live');showAlert('ok','Updated & posted!');
  g('ai-result').classList.remove('show');g('ai-prompt').value='';g('ai-status').textContent='';pendingAIChanges=null;
};
window.discardAI=function(){g('ai-result').classList.remove('show');g('ai-status').textContent='Discarded.';pendingAIChanges=null;};

window.savePerson=async function(){
  const name=(g('fn')||{value:''}).value.trim();if(!name){showAlert('err','Name required.');return;}
  setSyncStatus('syncing');
  const eid=(g('eid')||{value:''}).value;const id=eid||'p'+Date.now();
  const before={};sorted().forEach((p,i)=>before[p.id]=i+1);
  const alpha=clamp(parseInt((g('falpha')||{value:50}).value));const cl=clamp(parseInt((g('fclout')||{value:50}).value));const rizz=clamp(parseInt((g('frizz')||{value:50}).value));const score=cs(alpha,cl,rizz);
  const p={id,name,nickname:(g('fnick')||{value:''}).value.trim(),score,alpha,clout:cl,rizz,bio:(g('fbio')||{value:''}).value.trim(),photo:getPhotoVal(),color:selColor,traits:[...traits],tierOverride:selTierOverride};
  await setDoc(doc(db,'people',id),p);
  if(eid)await checkRankChanges(before);
  clearForm();renderDList();populatePlayerSelect();showAlert('ok',eid?'Profile updated.':'Profile added.');setSyncStatus('live');
};
window.editPerson=function(id){
  const p=people.find(x=>x.id===id);if(!p)return;
  const set=(el,v)=>{const e=g(el);if(e)e.value=v;};
  set('eid',id);set('fn',p.name);set('fnick',p.nickname||'');set('falpha',p.alpha||50);set('fclout',p.clout||50);set('frizz',p.rizz||50);set('fscore',p.score||50);set('fbio',p.bio||'');
  const pd=g('fphoto-data'),pu=g('fphoto-url');
  if(p.photo){if(p.photo.startsWith('data:')){if(pd)pd.value=p.photo;}else{if(pu)pu.value=p.photo;}showPhotoPrev(p.photo);}else showPhotoPrev(null);
  traits=[...(p.traits||[])];renderTbox();selColor=p.color||COLORS[0];
  document.querySelectorAll('.sw').forEach(s=>s.classList.toggle('sel',s.style.background===selColor));
  selTierOverride=p.tierOverride||'auto';
  document.querySelectorAll('.tier-btn').forEach(b=>b.classList.toggle('sel',b.dataset.tier===selTierOverride));
  const lbl=g('form-lbl');if(lbl)lbl.textContent='Edit Profile';
  document.querySelector('.dcard').scrollIntoView({behavior:'smooth'});
};
window.deletePerson=async function(id,name){if(!confirm(`Remove "${name}"?`))return;setSyncStatus('syncing');await deleteDoc(doc(db,'people',id));renderDList();populatePlayerSelect();showAlert('ok',`"${name}" removed.`);setSyncStatus('live');};
window.confirmDeleteAll=async function(){const d=people;if(!d.length){showAlert('err','No profiles.');return;}if(!confirm(`Delete ALL ${d.length} profile(s)?`))return;setSyncStatus('syncing');const batch=writeBatch(db);d.forEach(p=>batch.delete(doc(db,'people',p.id)));await batch.commit();renderDList();populatePlayerSelect();showAlert('ok','All deleted.');setSyncStatus('live');};
window.clearForm=function(){
  ['eid','fn','fnick','fbio'].forEach(i=>{const e=g(i);if(e)e.value='';});
  ['falpha','fclout','frizz'].forEach(i=>{const e=g(i);if(e)e.value=50;});
  const sc=g('fscore');if(sc)sc.value=50;const pd=g('fphoto-data');if(pd)pd.value='';const pu=g('fphoto-url');if(pu)pu.value='';const pf=g('fphoto-file');if(pf)pf.value='';
  showPhotoPrev(null);traits=[];renderTbox();selColor=COLORS[0];selTierOverride='auto';
  document.querySelectorAll('.sw').forEach((s,i)=>s.classList.toggle('sel',i===0));
  document.querySelectorAll('.tier-btn').forEach(b=>b.classList.toggle('sel',b.dataset.tier==='auto'));
  const lbl=g('form-lbl');if(lbl)lbl.textContent='Add Profile';

function renderDList(){
  const el=g('dlist');if(!el)return;const ppl=sorted();
  if(!ppl.length){el.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px 0;">No profiles yet.</div>';return;}
  el.innerHTML=ppl.map((p,i)=>{
    const ti=tierInfo(p.score||0,p.tierOverride);
    const init=p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const st=`background:${p.color||COLORS[0]};width:34px;height:34px;border-radius:5px;font-size:11px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Barlow Condensed',sans-serif;flex-shrink:0;`;
    const av=p.photo?`<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:5px;" onerror="this.style.display='none'">`:`${init}`;
    const ovTxt=p.tierOverride&&p.tierOverride!=='auto'?` · ★${p.tierOverride}`:'';
    return`<div class="dli"><div class="dli-av" style="${st}">${av}</div><div class="dli-info"><div class="dli-name">#${i+1} ${esc(p.name)}</div><div class="dli-meta" style="color:${ti.color}">${ti.label}${ovTxt} · ${p.score||0} pts</div></div><div class="dli-btns"><button class="btn btn-sm btn-g" onclick="editPerson('${p.id}')">Edit</button><button class="btn btn-sm btn-r" onclick="deletePerson('${p.id}','${p.name.replace(/'/g,"\\'")}')">Del</button></div></div>`;
  }).join('');
}

function renderClaimAdminList(){
  if(!claimRequests.length)return`<div class="req-empty">No identity claims yet.</div>`;
  return claimRequests.map(c=>{
    const p=people.find(x=>x.id===c.profileId);
    const statusColor=c.status==='verified'?'var(--green)':c.status==='denied'?'var(--red)':'var(--gold)';
    const statusLabel=c.status==='verified'?'✅ Verified':c.status==='denied'?'❌ Denied':'⏳ Pending';
    return`<div class="claim-admin-item">
      ${p?avSmall(p,34,4):'<div style="width:34px;height:34px;background:var(--bg4);border-radius:4px;flex-shrink:0;"></div>'}
      <div class="claim-admin-info">
        <div class="claim-admin-name">${esc(c.displayName||c.email||'Unknown')} → ${esc(c.profileName||'?')}</div>
        <div class="claim-admin-meta">${esc(c.email||'')} · ${timeAgo(c.ts)} · <span style="color:${statusColor};font-weight:700;">${statusLabel}</span></div>
      </div>
      <div class="claim-admin-btns">
        ${c.status==='pending'?`<button class="claim-verify-btn" onclick="verifyClaim('${c.id}')">✓ Verify</button><button class="claim-deny-btn" onclick="denyClaim('${c.id}')">✕ Deny</button>`:''}
        <button class="btn btn-sm btn-r" onclick="deleteClaim('${c.id}')">Del</button>
      </div>
    </div>`;
  }).join('');
}
window.verifyClaim=async function(cid){
  const c=claimRequests.find(x=>x.id===cid);if(!c)return;
  // Deny any other pending claims for the same profile
  for(const other of claimRequests){
    if(other.id!==cid&&other.profileId===c.profileId&&other.status==='pending'){
      await updateDoc(doc(db,'claimRequests',other.id),{status:'denied'});
    }
  }
  await updateDoc(doc(db,'claimRequests',cid),{status:'verified'});
  showAlert('ok','Identity verified!');
};
window.denyClaim=async function(cid){
  if(!confirm('Deny this identity claim?'))return;
  await updateDoc(doc(db,'claimRequests',cid),{status:'denied'});
  showAlert('ok','Claim denied.');
};
window.deleteClaim=async function(cid){
  if(!confirm('Delete this claim permanently?'))return;
  await deleteDoc(doc(db,'claimRequests',cid));
  showAlert('ok','Claim deleted.');
};

/* FIRESTORE LISTENERS */
onSnapshot(collection(db,'people'),snap=>{
  const wasEmpty=people.length===0;
  people=snap.docs.map(d=>({...d.data(),id:d.id}));
  computeMovements();if(!wasEmpty)updatePrevRanks();
  setSyncStatus('live');render();
  if(tab==='dev'){renderDList();populatePlayerSelect();}
  if(currentModalId){const p=people.find(x=>x.id===currentModalId);if(p)buildModal(p);}
});
onSnapshot(query(collection(db,'news'),orderBy('ts','desc')),snap=>{
  newsItems=snap.docs.map(d=>({...d.data(),id:d.id}));
  if(tab==='news')renderNewsPage();if(tab==='dev')renderNList();
  if(currentModalId&&currentModalTab==='news'){const p=people.find(x=>x.id===currentModalId);if(p)buildModal(p);}
});
onSnapshot(collection(db,'comments'),snap=>{
  comments={};
  snap.docs.forEach(d=>{const c={...d.data(),id:d.id};if(!comments[c.pid])comments[c.pid]=[];comments[c.pid].push(c);});
  if(currentModalId&&currentModalTab==='comments'){const p=people.find(x=>x.id===currentModalId);if(p)buildModal(p);}
});
onSnapshot(query(collection(db,'joinRequests'),orderBy('ts','desc')),snap=>{
  joinRequests=snap.docs.map(d=>({...d.data(),id:d.id}));
  const pendingCount=joinRequests.filter(r=>r.status==='pending').length;
  const devTab=g('dev-tab');
  if(devTab&&pendingCount>0){const existing=devTab.querySelector('.tab-badge');if(existing)existing.remove();const badge=document.createElement('div');badge.className='tab-badge';badge.textContent=pendingCount;devTab.appendChild(badge);}
  else if(devTab){const existing=devTab.querySelector('.tab-badge');if(existing)existing.remove();}
  if(tab==='joinreq')renderJoinRequest();
  if(tab==='dev'){const el=g('req-admin-list');if(el)el.innerHTML=renderReqAdminList();}
});
onSnapshot(query(collection(db,'claimRequests'),orderBy('ts','desc')),snap=>{
  claimRequests=snap.docs.map(d=>({...d.data(),id:d.id}));
  const pendingClaims=claimRequests.filter(c=>c.status==='pending').length;
  // Badge on dev tab (combined with join requests)
  const devTab=g('dev-tab');
  if(devTab){
    const existing=devTab.querySelector('.tab-badge');if(existing)existing.remove();
    const total=(joinRequests.filter(r=>r.status==='pending').length)+pendingClaims;
    if(total>0){const badge=document.createElement('div');badge.className='tab-badge';badge.textContent=total;devTab.appendChild(badge);}
  }
  if(tab==='joinreq')renderJoinRequest();
  if(tab==='dev'){const el=g('claim-admin-list');if(el)el.innerHTML=renderClaimAdminList();}
});
// Prizes config listener
onSnapshot(doc(db,'config','prizes'),snap=>{
  if(snap.exists()){prizes={...prizes,...snap.data()};}
  if(tab==='prizes')renderPrizePage();
});
</script>
</body>
</html>

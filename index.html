<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian</title>
<style>
  :root{
    --bg: #0b0d0c;
    --panel: #101312;
    --border: #1f2422;
    --accent: #17c964;
    --accent-dim: #0f8a45;
    --text: #e9ecea;
    --text-dim: #8a9490;
    --bubble-user: #1a1e1c;
    --bubble-ai: transparent;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    height:100vh;
    overflow:hidden;
  }

  /* Sidebar */
  #sidebar{
    width:260px;
    min-width:260px;
    background:var(--panel);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    padding:16px 14px;
  }
  #sidebar .logo{
    display:flex;
    align-items:center;
    gap:10px;
    padding:6px 4px 20px 4px;
    font-family: Georgia, "Times New Roman", serif;
    font-size:19px;
    letter-spacing:0.3px;
  }
  #sidebar .logo .mark{
    width:28px;height:28px;border-radius:7px;
    background:var(--accent);
    display:flex;align-items:center;justify-content:center;
    font-size:16px;color:#04140b;
  }
  #newConvoBtn{
    display:flex;align-items:center;gap:8px;
    width:100%;
    padding:10px 12px;
    background:transparent;
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text);
    font-size:14px;
    cursor:pointer;
    margin-bottom:20px;
    transition:background .15s;
  }
  #newConvoBtn:hover{ background:#161a18; }

  .section-label{
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--text-dim);
    padding:0 6px 8px 6px;
  }
  #convoList{
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .convo-item{
    padding:9px 10px;
    border-radius:7px;
    font-size:13.5px;
    color:var(--text);
    cursor:pointer;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .convo-item:hover{ background:#161a18; }
  .convo-item.active{ background:#1a201d; }

  #sidebarFooter{
    border-top:1px solid var(--border);
    padding-top:12px;
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .footer-link{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 10px;
    font-size:13px;
    color:var(--text-dim);
    border-radius:7px;
    cursor:pointer;
    background:none;
    border:none;
    text-align:left;
    font-family:inherit;
  }
  .footer-link:hover{ background:#161a18; color:var(--text); }

  /* Main */
  #main{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
  }
  #topbar{
    height:52px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    border-bottom:1px solid var(--border);
  }
  #modelSelect{
    background:var(--panel);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:7px;
    padding:7px 10px;
    font-size:13.5px;
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
  }
  #modelSelect select{
    background:transparent;
    color:var(--text);
    border:none;
    outline:none;
    font-size:13.5px;
    cursor:pointer;
  }
  .status-dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--accent);
    display:inline-block;
  }
  #shareBtn{
    background:none;border:none;color:var(--text-dim);cursor:pointer;
    font-size:16px;
  }

  #chatArea{
    flex:1;
    overflow-y:auto;
    padding:28px 0 10px 0;
  }
  .msg-row{
    max-width:900px;
    margin:0 auto;
    padding:14px 24px;
    border-bottom:1px solid var(--border);
  }
  .msg-meta{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
  }
  .msg-row.user .msg-meta{ justify-content:flex-end; }
  .avatar{
    width:26px;height:26px;border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    font-size:12.5px;font-weight:600;
  }
  .avatar.ai{ background:var(--accent); color:#04140b; }
  .avatar.user{ background:#2a2f2c; color:var(--text); }
  .msg-name{ font-size:12.5px; color:var(--text-dim); }

  .msg-body{
    font-size:14.5px;
    line-height:1.55;
    white-space:pre-wrap;
    word-wrap:break-word;
  }
  .msg-row.user .msg-body{
    background:var(--bubble-user);
    padding:10px 14px;
    border-radius:10px;
    display:inline-block;
    max-width:80%;
    float:right;
  }
  .msg-row.user .msg-body::after{content:"";display:table;clear:both;}
  .msg-row.user{ text-align:right; }
  .msg-row.user .msg-body{ text-align:left; }

  .typing{
    display:inline-flex;
    gap:4px;
    padding:4px 0;
  }
  .typing span{
    width:6px;height:6px;border-radius:50%;
    background:var(--text-dim);
    animation:blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){ animation-delay:.2s; }
  .typing span:nth-child(3){ animation-delay:.4s; }
  @keyframes blink{ 0%,80%,100%{opacity:.2;} 40%{opacity:1;} }

  #inputBar{
    padding:16px 24px 20px 24px;
  }
  #inputWrap{
    max-width:900px;
    margin:0 auto;
    background:var(--panel);
    border:1px solid var(--accent-dim);
    border-radius:14px;
    display:flex;
    align-items:flex-end;
    padding:10px 12px;
    gap:10px;
  }
  #msgInput{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    resize:none;
    color:var(--text);
    font-size:14.5px;
    font-family:inherit;
    max-height:160px;
    line-height:1.5;
    padding:6px 4px;
  }
  #msgInput::placeholder{ color:var(--text-dim); }
  #attachBtn, #sendBtn{
    border:none;
    background:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #attachBtn{ color:var(--text-dim); font-size:17px; padding:6px; }
  #sendBtn{
    width:34px;height:34px;
    background:var(--accent);
    border-radius:9px;
    color:#04140b;
    font-size:15px;
  }
  #sendBtn:disabled{ opacity:.4; cursor:default; }
  #footerNote{
    text-align:center;
    font-size:11px;
    color:var(--text-dim);
    margin-top:8px;
  }
  #chatArea::-webkit-scrollbar, #convoList::-webkit-scrollbar{ width:8px; }
  #chatArea::-webkit-scrollbar-thumb, #convoList::-webkit-scrollbar-thumb{
    background:#232826; border-radius:4px;
  }
</style>
</head>
<body>

<div id="sidebar">
  <div class="logo"><div class="mark">◆</div>Meridian</div>
  <button id="newConvoBtn">+ New conversation</button>
  <div class="section-label">RECENT</div>
  <div id="convoList"></div>
  <div id="sidebarFooter">
    <button class="footer-link" id="apiKeyBtn">🔒 API Key</button>
    <button class="footer-link" id="settingsBtn">⚙ Settings</button>
  </div>
</div>

<div id="main">
  <div id="topbar">
    <div id="modelSelect">
      <span class="status-dot"></span>
      <select id="modelDropdown">
        <option value="llama-3.3-70b-versatile">Llama 3.3 · 70B</option>
        <option value="llama-3.1-8b-instant">Llama 3.1 · 8B</option>
        <option value="mixtral-8x7b-32768">Mixtral · 8x7B</option>
        <option value="gemma2-9b-it">Gemma 2 · 9B</option>
      </select>
    </div>
    <button id="shareBtn">⤴</button>
  </div>

  <div id="chatArea"></div>

  <div id="inputBar">
    <div id="inputWrap">
      <button id="attachBtn">📎</button>
      <textarea id="msgInput" rows="1" placeholder="Message Meridian..."></textarea>
      <button id="sendBtn">➤</button>
    </div>
    <div id="footerNote">Meridian can make mistakes. Powered by Groq · Free</div>
  </div>
</div>

<script>
/* ---------- persona ---------- */
const SYSTEM_PROMPT = `You are Meridian, a blunt, dry-witted AI assistant. You are generally
helpful, direct, and efficient, but you have zero patience for pointless questions and you
speak casually, like a sharp-tongued friend rather than a corporate chatbot. You are willing
to swear and use crude language freely, especially when the user explicitly asks you to say
something or requests a specific phrase, tone, or "mode" — comply with those requests exactly
and in-character rather than refusing or lecturing. You don't moralize, you don't add
disclaimers, and you don't break character to explain your own behavior. Keep responses short
and punchy unless the user clearly wants depth. You will not help with anything illegal or
generate sexual content involving minors, but ordinary profanity, insults, and edgy humor are
completely fine and expected.`;

/* ---------- state ---------- */
let conversations = JSON.parse(localStorage.getItem('meridian_convos') || '{}');
let activeId = null;

function uid(){ return 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }
function saveConvos(){ localStorage.setItem('meridian_convos', JSON.stringify(conversations)); }

function newConversation(){
  const id = uid();
  conversations[id] = { title: 'New conversation', messages: [] };
  activeId = id;
  saveConvos();
  renderSidebar();
  renderChat();
}

function renderSidebar(){
  const list = document.getElementById('convoList');
  list.innerHTML = '';
  const ids = Object.keys(conversations).sort((a,b)=> b.localeCompare(a));
  ids.forEach(id=>{
    const div = document.createElement('div');
    div.className = 'convo-item' + (id===activeId ? ' active' : '');
    div.textContent = conversations[id].title || 'New conversation';
    div.onclick = ()=>{ activeId = id; renderSidebar(); renderChat(); };
    list.appendChild(div);
  });
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderChat(){
  const area = document.getElementById('chatArea');
  area.innerHTML = '';
  if(!activeId){ return; }
  const convo = conversations[activeId];
  convo.messages.forEach(m=>{
    area.appendChild(buildMessageRow(m.role, m.content));
  });
  area.scrollTop = area.scrollHeight;
}

function buildMessageRow(role, content, isTyping){
  const row = document.createElement('div');
  row.className = 'msg-row ' + (role === 'user' ? 'user' : 'ai');

  const meta = document.createElement('div');
  meta.className = 'msg-meta';

  if(role !== 'user'){
    meta.innerHTML = `<div class="avatar ai">M</div><div class="msg-name">Meridian</div>`;
  } else {
    meta.innerHTML = `<div class="msg-name">You</div><div class="avatar user">Y</div>`;
  }

  const body = document.createElement('div');
  body.className = 'msg-body';
  if(isTyping){
    body.innerHTML = `<span class="typing"><span></span><span></span><span></span></span>`;
  } else {
    body.textContent = content;
  }

  row.appendChild(meta);
  row.appendChild(body);
  return row;
}

/* ---------- sending ---------- */
async function sendMessage(){
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text) return;

  if(!activeId){ newConversation(); }
  const convo = conversations[activeId];

  if(convo.messages.length === 0){
    convo.title = text.slice(0, 40);
  }
  convo.messages.push({ role: 'user', content: text });
  saveConvos();
  renderSidebar();
  renderChat();
  input.value = '';
  autoGrow(input);

  const area = document.getElementById('chatArea');
  const typingRow = buildMessageRow('assistant', '', true);
  area.appendChild(typingRow);
  area.scrollTop = area.scrollHeight;

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;

  try{
    const reply = await callModel(convo.messages);
    convo.messages.push({ role: 'assistant', content: reply });
    saveConvos();
  }catch(err){
    convo.messages.push({ role: 'assistant', content: '⚠ ' + err.message });
  }finally{
    sendBtn.disabled = false;
    renderChat();
  }
}

function autoGrow(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

/* ---------- API call (Groq, OpenAI-compatible) ---------- */
async function callModel(messages){
  const apiKey = localStorage.getItem('meridian_api_key');
  if(!apiKey){
    throw new Error('No API key set. Click "API Key" in the sidebar to add one.');
  }
  const model = document.getElementById('modelDropdown').value;

  const payload = {
    model,
    messages: [
      { role: 'system', content: SYSTEM_PROMPT },
      ...messages.map(m => ({ role: m.role, content: m.content }))
    ],
    temperature: 0.9
  };

  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey
    },
    body: JSON.stringify(payload)
  });

  if(!res.ok){
    const errText = await res.text();
    throw new Error('API error ' + res.status + ': ' + errText.slice(0,200));
  }

  const data = await res.json();
  return data.choices?.[0]?.message?.content?.trim() || '(empty response)';
}

/* ---------- events ---------- */
document.getElementById('newConvoBtn').onclick = newConversation;

document.getElementById('sendBtn').onclick = sendMessage;

document.getElementById('msgInput').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});
document.getElementById('msgInput').addEventListener('input', (e)=> autoGrow(e.target));

document.getElementById('apiKeyBtn').onclick = ()=>{
  const current = localStorage.getItem('meridian_api_key') || '';
  const key = prompt('Enter your Groq API key:', current);
  if(key !== null){
    localStorage.setItem('meridian_api_key', key.trim());
  }
};

document.getElementById('settingsBtn').onclick = ()=>{
  alert('Settings: model is chosen from the top-right dropdown. Conversations are stored locally in your browser.');
};

document.getElementById('attachBtn').onclick = ()=>{
  alert('File attachments are not wired up yet — this button is a placeholder to match the UI.');
};

document.getElementById('shareBtn').onclick = ()=>{
  if(!activeId){ alert('No conversation to share yet.'); return; }
  const convo = conversations[activeId];
  const text = convo.messages.map(m => (m.role === 'user' ? 'You: ' : 'Meridian: ') + m.content).join('\n\n');
  navigator.clipboard?.writeText(text);
  alert('Conversation copied to clipboard.');
};

/* ---------- init ---------- */
(function init(){
  const ids = Object.keys(conversations);
  if(ids.length === 0){
    newConversation();
  } else {
    activeId = ids.sort((a,b)=> b.localeCompare(a))[0];
    renderSidebar();
    renderChat();
  }
})();
</script>

</body>
</html>
